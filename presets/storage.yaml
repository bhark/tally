# Example EXTRA config-patch for a storage node, appended after the `storage`
# profile.
#
# The storage profile supplies the rbd kernel module; the install target is your
# per-run diskSelector answer (data NVMe + HDDs stay raw for Rook). Genuine Ceph
# node sysctls belong here - they merge with the common userns sysctl. Note that
# nofile is a pod securityContext limit, NOT a sysctl: set it in Rook (GitOps).
machine:
  nodeLabels:
    workload: storage
  sysctls:
    fs.aio-max-nr: "1048576" # BlueStore async IO contexts; raise for many OSDs
